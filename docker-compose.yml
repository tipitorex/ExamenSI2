services:
  db:
    image: postgres:16-alpine
    container_name: emergencias_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emergencias_backend
    restart: unless-stopped
    environment:
      APP_NAME: Plataforma Emergencias API
      APP_ENV: dev
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      HUGGINGFACE_API_TOKEN: ${HUGGINGFACE_API_TOKEN}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: emergencias_frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_PORT: "0"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules   # 🔥 CLAVE (evita errores npm)
    command: sh -c "npm install && npm run dev"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4200', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend_prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: emergencias_frontend_prod
    restart: unless-stopped
    ports:
      - "4201:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: emergencias_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  frontend_node_modules:   # 🔥 CLAVE